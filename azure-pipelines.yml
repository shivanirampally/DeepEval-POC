trigger:
- main

pool:
  name: Default

steps:

# Checkout source code
- checkout: self

# Verify Python installation
- script: |
    echo Current PATH:
    echo %PATH%

    python --version
    pip --version
    where python
    where pip
  displayName: "Verify Python"

# Install project dependencies
- script: |
    python -m pip install --upgrade pip
    python -m pip install -r requirements.txt
  displayName: "Install Dependencies"

# Verify that the agent service can reach local Ollama
- powershell: |
    Invoke-RestMethod http://127.0.0.1:11434/api/tags
  displayName: "Verify Ollama API"

# Execute hallucination test suite
- script: |
    python -m pytest tests -v --alluredir=allure-results
  displayName: "Run Hallucination Tests"

# Generate and display Allure report in Azure DevOps
- task: PublishAllureReport@2
  displayName: "Publish Allure Report"
  condition: always()
  inputs:
    testResultsDir: "allure-results"
    reportName: "Hallucination Test Report"

# Publish raw Allure results as a downloadable artifact
- task: PublishBuildArtifacts@1
  displayName: "Publish Allure Results"
  condition: always()
  inputs:
    PathtoPublish: "allure-results"
    ArtifactName: "AllureResults"

# Publish Excel report as a downloadable artifact
- task: PublishBuildArtifacts@1
  displayName: "Publish Execution Reports"
  condition: always()
  inputs:
    PathtoPublish: "execution_reports"
    ArtifactName: "ExecutionReports"