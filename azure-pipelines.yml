trigger:
- main

pool:
  name: Default

steps:

- checkout: self

- script: |
    python --version
    pip --version
  displayName: "Verify Python"

- script: |
    pip install -r requirements.txt
  displayName: "Install Dependencies"

- script: |
    ollama list
  displayName: "Verify Ollama"

- script: |
    pytest -v --alluredir=allure-results
  displayName: "Run Hallucination Tests"

- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: 'allure-results'
    ArtifactName: 'AllureResults'

- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: 'execution_reports'
    ArtifactName: 'ExecutionReports'